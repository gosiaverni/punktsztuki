<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Reset hasła</title>

  <link rel="stylesheet" href="/start/start.css">

  <style>
    .reset-page {
      background-color: #f6f2ed;
      min-height: calc(100vh - 60px);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .reset-container {
      background-color: #9d1629;
      width: 100%;
      max-width: 600px;
      border-radius: 25px;
      padding: 60px 80px;
      color: #f6f2ed;
      margin-top: -60px;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .reset-container h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .reset-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input {
      background: #f6f2ed;
      border: none;
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 14px;
      width: 100%;
    }

    .submit-btn {
      margin-top: 10px;
      background-color: #2b2b2b;
      color: #f6f2ed;
      border: none;
      padding: 12px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
    }

    .submit-btn:hover {
      background-color: #000;
    }
  </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<header class="navbar">
  <div class="logo" onclick="location.href='/'">Punkt Sztuki</div>

  <nav class="nav">
    <div class="dropdown">
      <button class="nav-btn">SZUKAJ</button>
      <div class="dropdown-content">
        <div onclick="location.href='/map'">Mapa wydarzeń</div>
        <div onclick="location.href='/list'">Lista wydarzeń</div>
      </div>
    </div>

    <div class="dropdown">
      <button class="nav-btn">DODAJ</button>
      <div class="dropdown-content">
        <div onclick="requireAuth('/create')">Dodaj wydarzenie</div>
      </div>
    </div>

    <div id="auth-section"></div>
  </nav>
</header>

<!-- 🔥 CONTENT -->
<main class="reset-page">
  <div class="reset-container">

    <h1>Ustaw nowe hasło</h1>

    <div class="reset-form">
      <input type="password" id="new-password" class="input" placeholder="Nowe hasło">
      <button id="save-password" class="submit-btn">Zapisz</button>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js"></script>
<script src="/start/start.js"></script>

<script>
  document.getElementById("save-password").onclick = async () => {
    const password = document.getElementById("new-password").value;

    if (!password) {
      alert("Podaj hasło");
      return;
    }

    const { error } = await supabaseClient.auth.updateUser({
      password
    });

    if (error) {
      console.error(error);
      alert("Błąd zmiany hasła");
      return;
    }

    alert("Hasło zmienione!");
    window.location.href = "/auth";
  };
</script>

</body>
</html>
