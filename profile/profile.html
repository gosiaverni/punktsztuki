<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
  <link rel="stylesheet" href="/start/start.css">
</head>
<body>

<header class="navbar">
  <div class="logo" onclick="location.href='/'">
    Punkt Sztuki
  </div>

  <nav class="nav">
    <div class="dropdown">
      <button class="nav-btn">SZUKAJ</button>
      <div class="dropdown-content">
        <div onclick="location.href='/map'">Mapa wydarzeń</div>
        <div onclick="location.href='/list'">Lista wydarzeń</div>
      </div>
    </div>

    <div class="dropdown">
      <button class="nav-btn">DODAJ</button>
      <div class="dropdown-content">
        <div onclick="requireAuth('/create')">Dodaj wydarzenie</div>
      </div>
    </div>

    <div id="auth-section"></div>
    
  </nav>
</header>

<main class="profile-page">

  <div class="profile-container">

    <h1>Profil</h1>

    <!-- 🔥 KARTA PROFILU -->
    <div class="profile-card">

      <img src="/assets/star.png" id="profile-image" class="profile-avatar">

      <div class="profile-info">
        <h2 id="profile-name">Twoje imię</h2>
        <p id="profile-handle">@twojhandle</p>

        <span class="edit-profile" id="edit-profile">Edytuj profil</span>
      </div>

    </div>

    <!-- 🔥 ZAPISANE -->
    <h3 class="section-title">Zapisane wydarzenia</h3>
    <div id="saved-events" class="events-grid"></div>

  </div>

</main>

<!-- 🪟 MODAL -->
<div class="profile-modal" id="profile-modal">

  <div class="profile-box">

  <span class="close-modal" id="close-profile">✕</span>

  <h2>Edytuj profil</h2>

  <div class="form-row">
    <label>zdjęcie profilowe</label>
    <input type="file" id="avatar-input" class="file-input">
  </div>

  <div class="form-row">
    <label>nazwa profilu</label>
    <input type="text" id="name-input" class="input" placeholder="imię i nazwisko">
  </div>

  <div class="form-row">
    <label>username</label>
    <input type="text" id="handle-input" class="input" placeholder="@handle">
  </div>

  <!-- 🔥 TU -->
  <button id="save-profile" class="submit-btn">zapisz</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js"></script>
<script src="/profile/profile.js"></script>
<script src="/start/start.js"></script>

</body>
</html>
