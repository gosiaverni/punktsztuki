<!DOCTYPE html>
<html lang="pl">
    <head>
  <meta charset="UTF-8">
  <title>Autoryzacja</title>
 <link rel="stylesheet" href="/start/start.css">
</head>
<body>

  <header class="navbar">
  <div class="logo" onclick="location.href='/'">
    Punkt Sztuki
  </div>

  <nav class="nav">
    <div class="dropdown">
      <button class="nav-btn">SZUKAJ</button>
      <div class="dropdown-content">
        <div onclick="location.href='/map'">Mapa wydarzeń</div>
        <div onclick="location.href='/list'">Lista wydarzeń</div>
        
      </div>
    </div>

    <div class="dropdown">
      <button class="nav-btn">DODAJ</button>
      <div class="dropdown-content">
        <div onclick="location.href='/create'">Dodaj wydarzenie</div>
        <div>Dodaj recenzję</div>
      </div>
    </div>

    <div id="auth-section"></div>
  </nav>
</header>

<main class="auth-page">

  <div class="auth-container">

    <h1 id="auth-title">Logowanie</h1>

    <form id="auth-form">

     <div class="auth-field">
  <label>adres e-mail</label>
  <input type="email" id="email" class="input">
</div>

      <div class="auth-field">
  <label>hasło</label>
  <input type="password" id="password" class="input">
</div>

      <button type="submit" class="submit-btn" id="auth-btn">
        zaloguj się
      </button>

    </form>

    <div class="auth-links">
      <span id="toggle-auth">Rejestracja</span>
    </div>
<div class="auth-links">
  <span id="forgot-password">Zapomniałeś hasła?</span>
</div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js"></script>
<script src="/start/start.js"></script>
<script src="/auth/auth.js"></script>

</body>
</html>
